name: Deploy NYSC 3-Tier App to AWS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-1
  TF_VERSION: 1.6.0

jobs:
  # ── Job 1: Deploy Infrastructure ─────────────────────────────
  infrastructure:
    name: Terraform Infrastructure
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.tf_output.outputs.api_url }}
      frontend_bucket: ${{ steps.tf_output.outputs.frontend_bucket }}
      cloudfront_id: ${{ steps.tf_output.outputs.cloudfront_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Package Lambda functions
        working-directory: backend
        run: |
          npm ci --omit=dev
          zip -r function.zip src node_modules package.json

      - name: Terraform Init
        working-directory: infrastructure
        run: terraform init

      - name: Terraform Plan
        working-directory: infrastructure
        run: terraform plan -var="from_email=${{ secrets.FROM_EMAIL }}" -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        working-directory: infrastructure
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        id: tf_output
        if: github.ref == 'refs/heads/main'
        working-directory: infrastructure
        run: |
          echo "api_url=$(terraform output -raw api_gateway_url)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw frontend_bucket_name 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "cloudfront_id=$(terraform output -raw cloudfront_distribution_id 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

  # ── Job 2: Build & Deploy Frontend ───────────────────────────
  frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: infrastructure
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build Frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ needs.infrastructure.outputs.api_url }}
        run: |
          npm ci
          npm run build

      - name: Deploy to S3
        working-directory: frontend
        run: |
          aws s3 sync dist/ s3://${{ needs.infrastructure.outputs.frontend_bucket }} \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html s3://${{ needs.infrastructure.outputs.frontend_bucket }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront Cache
        if: needs.infrastructure.outputs.cloudfront_id != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.infrastructure.outputs.cloudfront_id }} \
            --paths "/*"
